<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VaiperXWIN100">
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/5yRHnBvh/70A88D3F-B427-4B76-9431-11E32323D5FA.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/5yRHnBvh/70A88D3F-B427-4B76-9431-11E32323D5FA.png">

    <title>VaiperX Premium Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Prompt:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', 'Orbitron', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #030000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        #lightningCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4; 
            pointer-events: none;
        }

        /* วิดีโอเดี่ยวเล่นเต็มจออยู่เลเยอร์ล่างสุด */
        .app-shared-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
        }

        /* ม่านดำบังหน้าจอตอนแรก */
        .black-shutter {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000000;
            z-index: 9998;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* ================= หน้าอินโทรแรกเข้าสู่ระบบ ================= */
        .video-loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent; 
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .tap-prompt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 10000;
            transition: opacity 0.4s ease;
        }

        .tap-text {
            font-size: 1.15rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            animation: textPulse 1.5s infinite ease-in-out;
            text-align: center;
            padding: 0 20px;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        .video-loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* ================= ส่วนโครงสร้างหน้าเมนูหลัก UI ================= */
        .cyber-panel {
            width: 100%;
            max-width: 420px;
            height: calc(100vh - 24px);
            max-height: 820px;
            
            /* [จุดแก้ไขสำคัญ]: ปรับพื้นหลังเป็นแบบโปร่งแสง (rgba) และใส่ backdrop-filter เพื่อดึงภาพวิดีโอหลังจอให้ทะลุเข้ามาในเมนู */
            background: rgba(10, 2, 2, 0.35); 
            backdrop-filter: blur(12px) saturate(120%);
            -webkit-backdrop-filter: blur(12px) saturate(120%);
            
            border: 2px solid rgba(255, 13, 13, 0.7);
            border-radius: 28px;
            box-shadow: 0 0 35px rgba(255, 13, 13, 0.3), inset 0 0 25px rgba(255, 13, 13, 0.15);
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            margin: 12px;
            
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; 
            z-index: 2; 
        }

        .cyber-panel.show {
            opacity: 1;
            transform: scale(1);
        }

        /* ปรับแผ่นฟิล์มซ้อนทับใน UI ให้เบาลง เพื่อให้รายละเอียดคลิปด้านหลังชัดเจนขึ้น */
        .ui-video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(5, 1, 1, 0.4) 0%, rgba(15, 2, 2, 0.55) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .accordion-wrapper {
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 2px;
            margin-bottom: 10px;
            position: relative;
            z-index: 3; 
        }

        .accordion-wrapper::-webkit-scrollbar {
            width: 0px;
        }

        /* ปรับแต่งส่วนหัวข้อเมนูต่างๆ ให้โปร่งใสและเห็นวิดีโอด้านหลังได้อย่างลงตัว */
        .menu-section {
            background: rgba(25, 4, 4, 0.45);
            border: 1px solid rgba(255, 13, 13, 0.3);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .menu-section.active {
            border-color: rgba(255, 13, 13, 0.85);
            box-shadow: 0 0 15px rgba(255, 13, 13, 0.3);
            background: rgba(45, 5, 5, 0.65);
        }

        .menu-header {
            padding: 18px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            background: transparent;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cyber-icon {
            width: 22px;
            height: 22px;
            fill: #ff0d0d;
            filter: drop-shadow(0 0 6px #ff0d0d);
            display: flex;
            align-items: center;
        }

        .menu-title {
            font-family: 'Orbitron', 'Prompt', sans-serif;
            font-size: 0.92rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.8px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.9);
        }

        .arrow-icon {
            width: 14px;
            height: 14px;
            fill: #851c1c;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .menu-section.active .arrow-icon {
            transform: rotate(180deg);
            fill: #ff0d0d;
            filter: drop-shadow(0 0 4px #ff0d0d);
        }

        .menu-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(0, 0, 0, 0.5);
        }

        .content-inner {
            padding: 6px 18px 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-top: 1px solid rgba(255, 13, 13, 0.2);
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.88rem;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        }

        .cyber-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .cyber-switch input { opacity: 0; width: 0; height: 0; }

        .cyber-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(61, 15, 15, 0.6);
            border: 1px solid rgba(255, 13, 13, 0.3);
            transition: .3s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 30px;
        }

        .cyber-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #a6a6a6;
            transition: .3s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 50%;
        }

        input:checked + .cyber-slider {
            background-color: #ff0d0d;
            border-color: #ff6666;
            box-shadow: 0 0 12px rgba(255, 13, 13, 0.6);
        }

        input:checked + .cyber-slider:before {
            transform: translateX(24px);
            background-color: #ffffff;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
        }

        .range-block {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        .range-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .range-label {
            width: 65px;
            font-size: 0.88rem;
            color: #ffffff;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        }

        .range-input {
            flex-grow: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: rgba(255, 13, 13, 0.2);
            border-radius: 10px;
            outline: none;
        }

        .range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff0d0d;
            cursor: pointer;
            box-shadow: 0 0 10px #ff0d0d;
            transition: transform 0.1s ease;
        }

        .range-input::-webkit-slider-thumb:active {
            transform: scale(1.25);
        }

        .range-val {
            width: 45px;
            text-align: right;
            font-size: 0.88rem;
            color: #ff3333;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-shadow: 0 0 5px rgba(255, 51, 51, 0.4);
        }

        .grid-select {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
        }

        .select-card {
            background: rgba(20, 2, 2, 0.5);
            border: 1px solid rgba(255, 13, 13, 0.4);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.92rem;
            color: #ffffff;
            font-weight: 600;
        }

        .select-card .radio-dot {
            width: 12px;
            height: 12px;
            border: 2px solid #ff0d0d;
            border-radius: 50%;
            position: relative;
        }

        .select-card .radio-dot::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff0d0d;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px #ff0d0d;
        }

        .action-btn {
            background: rgba(20, 2, 2, 0.5);
            border: 1px solid rgba(255, 13, 13, 0.4);
            border-radius: 14px;
            padding: 14px;
            color: #ffffff;
            font-size: 0.92rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .start-btn {
            background: linear-gradient(180deg, #ff0000 0%, #b80000 100%);
            border: 1px solid #ff6666;
            border-radius: 14px;
            padding: 18px;
            color: #ffffff;
            font-family: 'Orbitron', 'Prompt', sans-serif;
            font-size: 1.12rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
            margin-top: 12px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }

        .start-btn:active {
            transform: scale(0.98);
            box-shadow: 0 3px 10px rgba(255, 0, 0, 0.4);
        }

        .cyber-footer {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.68rem;
            font-weight: 700;
            color: #a63232;
            letter-spacing: 1.5px;
            margin-top: 12px;
            border-top: 1px solid rgba(255, 13, 13, 0.25);
            padding-top: 14px;
            position: relative;
            z-index: 3;
        }
        
        .cyber-footer span {
            color: #ff0d0d;
            text-shadow: 0 0 6px rgba(255, 13, 13, 0.7);
        }
    </style>
</head>
<body>

    <div class="black-shutter" id="blackShutter"></div>

    <video class="app-shared-video" id="appSharedVideo" loop playsinline webkit-playsinline preload="auto">
        <source src="https://media.discordapp.net/attachments/1347319667542327448/1516898181869473842/copy_05F0710C-FBE9-47DF-9DB2-A41791CF2AD9.mov?ex=6a364b45&is=6a34f9c5&hm=2106f6ec47f918b995687a8094590df2639f75b172040ea3f71e401b57586c14&" type="video/mp4">
    </video>

    <div class="video-loading-screen" id="loadingScreen" onclick="startIntroVideo()">
        <div class="tap-prompt-overlay" id="promptOverlay">
            <div class="tap-text">แตะจอ 1 ครั้งเพื่อเข้าสู่ระบบ</div>
        </div>
    </div>

    <div class="cyber-panel" id="mainPanel">
        
        <canvas id="lightningCanvas"></canvas>
        
        <div class="ui-video-overlay"></div>
        
        <div class="accordion-wrapper">
            
            <div class="menu-section" id="sec-aimbots">
                <div class="menu-header" onclick="toggleAccordion('sec-aimbots')">
                    <div class="header-left">
                        <svg class="cyber-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7.06-3.6-7.55-7.55H7v-2H5.45c.49-3.95 3.6-7.06 7.55-7.55V5h2v1.45c3.95.49 7.06 3.6 7.55 7.55H21v2h-1.45c-.49 3.95-3.6 7.06-7.55 7.55V19.93zM12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                        <span class="menu-title">PANEL FREEFIRE AIMBOTS</span>
                    </div>
                    <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
                </div>
                <div class="menu-content">
                    <div class="content-inner">
                        <div class="control-row">
                            <span>AIMBOTS 100%</span>
                            <label class="cyber-switch"><input type="checkbox"><span class="cyber-slider"></span></label>
                        </div>
                        <div class="control-row">
                            <span>ดูดหัว</span>
                            <label class="cyber-switch"><input type="checkbox"><span class="cyber-slider"></span></label>
                        </div>
                        <div class="control-row">
                            <span>ลดแรงดีด</span>
                            <label class="cyber-switch"><input type="checkbox"><span class="cyber-slider"></span></label>
                        </div>
                        <div class="control-row">
                            <span>กระสุนตรง</span>
                            <label class="cyber-switch"><input type="checkbox"><span class="cyber-slider"></span></label>
                        </div>
                        <div class="control-row">
                            <span>ขยายดาเมจหัว</span>
                            <label class="cyber-switch"><input type="checkbox"><span class="cyber-slider"></span></label>
                        </div>
                        <div class="control-row">
                            <span>AUTO AIMHEAD</span>
                            <label class="cyber-switch"><input type="checkbox"><span class="cyber-slider"></span></label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="menu-section" id="sec-screen">
                <div class="menu-header" onclick="toggleAccordion('sec-screen')">
                    <div class="header-left">
                        <svg class="cyber-icon" viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
                        <span class="menu-title">SET UP THE SCREEN</span>
                    </div>
                    <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
                </div>
                <div class="menu-content">
                    <div class="content-inner">
                        <div class="range-block">
                            <div class="range-row">
                                <span class="range-label">จอเร็ว</span>
                                <input type="range" class="range-input" id="quickScreenRange" min="0" max="500" value="250" oninput="updateRangeValue(this, 'val1')">
                                <span class="range-val" id="val1">250%</span>
                            </div>
                            <div class="range-row">
                                <span class="range-label">จอลื่น</span>
                                <input type="range" class="range-input" min="0" max="100" value="90" oninput="updateRangeValue(this, 'val2')">
                                <span class="range-val" id="val2">90%</span>
                            </div>
                            <div class="range-row">
                                <span class="range-label">มุมFOV</span>
                                <input type="range" class="range-input" min="0" max="360" value="360" oninput="updateRangeValue(this, 'val3')">
                                <span class="range-val" id="val3">360%</span>
                            </div>
                            <div class="range-row">
                                <span class="range-label">DPI แกน</span>
                                <input type="range" class="range-input" min="0" max="100" value="10" oninput="updateRangeValue(this, 'val4')">
                                <span class="range-val" id="val4">10%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="menu-section" id="sec-device">
                <div class="menu-header" onclick="toggleAccordion('sec-device')">
                    <div class="header-left">
                        <svg class="cyber-icon" viewBox="0 0 24 24"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></svg>
                        <span class="menu-title">เลือกเลือกรุ่นมือถือ</span>
                    </div>
                    <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
                </div>
                <div class="menu-content">
                    <div class="content-inner">
                        <div class="grid-select">
                            <div class="select-card">
                                <span class="radio-dot"></span> iOS
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="menu-section" id="sec-game">
                <div class="menu-header" onclick="toggleAccordion('sec-game')">
                    <div class="header-left">
                        <svg class="cyber-icon" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5 0.67 1.5 1.5-.67 1.5-1.5 1.5zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 9 18.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                        <span class="menu-title">เลือกตัวเกมส์</span>
                    </div>
                    <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
                </div>
                <div class="menu-content">
                    <div class="content-inner">
                        <div class="grid-select">
                            <button class="action-btn">Free Fire Max</button>
                        </div>
                        <button class="start-btn" onclick="launchPotatso()">Start Game</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="cyber-footer">
            DEVELOPED BY: <span>@VaiperX</span> / 2026 XIZ
        </div>

    </div>

    <script>
        // ================= ระบบความปลอดภัย Client เบื้องต้น =================
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
        });

        setInterval(function() {
            const before = new Date().getTime();
            debugger;
            const after = new Date().getTime();
            if (after - before > 100) {
                console.clear();
            }
        }, 1000);

        function launchPotatso() {
            window.location.href = "potatso://";
            setTimeout(function() {
                if (!document.webkitHidden && !document.hidden) {
                    window.location.href = "https://apps.apple.com/th/app/potatso/id1239860606";
                }
            }, 1500);
        }

        // ================= ส่วนควบคุม UI หน้าเว็บ =================
        const sharedVideo = document.getElementById('appSharedVideo');
        const canvas = document.getElementById('lightningCanvas');
        const ctx = canvas.getContext('2d');
        const loadingScreen = document.getElementById('loadingScreen');
        const mainPanel = document.getElementById('mainPanel');
        const promptOverlay = document.getElementById('promptOverlay');
        const blackShutter = document.getElementById('blackShutter');

        function forcePlayMedia() {
            if (sharedVideo) {
                sharedVideo.play().catch(e => console.log("กำลังรันล็อกวิดีโอพื้นหลัง..."));
            }
        }

        function resizeCanvas() {
            if(canvas && mainPanel) {
                canvas.width = mainPanel.offsetWidth;
                canvas.height = mainPanel.offsetHeight;
            }
        }

        function createLightningStrike() {
            const isMenuAppeared = sessionStorage.getItem('vaiper_app_started') === 'true';
            if (!isMenuAppeared || !mainPanel.classList.contains('show')) return; 
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let startX = Math.random() * canvas.width;
            let startY = 0;
            
            ctx.strokeStyle = 'rgba(255, 13, 13, 0.95)'; 
            ctx.lineWidth = Math.random() * 2 + 1.5;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff0000'; 
            
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            
            let currentX = startX;
            let currentY = startY;
            
            while (currentY < canvas.height) {
                currentX += (Math.random() * 30 - 15);
                currentY += (Math.random() * 25 + 10);
                ctx.lineTo(currentX, currentY);
            }
            
            ctx.stroke();
            
            setTimeout(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, 120);
        }

        function initLightningStorm() {
            let randomDelay = Math.floor(Math.random() * (7000 - 3000 + 1)) + 3000;
            setTimeout(() => {
                createLightningStrike();
                initLightningStorm();
            }, randomDelay);
        }

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                forcePlayMedia();
            }
        });

        window.addEventListener('pageshow', function() {
            forcePlayMedia();
            if (sessionStorage.getItem('vaiper_app_started') === 'true') {
                if(blackShutter) blackShutter.style.opacity = '0';
                if(loadingScreen) loadingScreen.style.display = 'none';
                if(mainPanel) mainPanel.classList.add('show');
                resizeCanvas();
            }
        });

        window.onload = function() {
            document.querySelectorAll('.menu-section').forEach(section => {
                section.classList.remove('active');
                section.querySelector('.menu-content').style.maxHeight = null;
            });

            const quickScreenRange = document.getElementById('quickScreenRange');
            quickScreenRange.value = 250;
            updateRangeValue(quickScreenRange, 'val1');

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            if (sessionStorage.getItem('vaiper_app_started') === 'true') {
                blackShutter.style.opacity = '0';
                loadingScreen.style.display = 'none';
                mainPanel.classList.add('show');
                initLightningStorm();
                forcePlayMedia();
            }
        };

        function startIntroVideo() {
            if (sessionStorage.getItem('vaiper_app_started') === 'true') return;

            if(promptOverlay) promptOverlay.style.opacity = '0';

            sharedVideo.muted = false;
            sharedVideo.currentTime = 0;
            
            let playPromise = sharedVideo.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    blackShutter.style.opacity = '0'; 
                    // เล่นวิดีโอเดี่ยวเต็มจอไป 6 วินาที ก่อนที่หน้าต่าง UI โปร่งใสจะเด้งขึ้นมาครอบทับ
                    setTimeout(showPanelOverVideo, 6000);
                }).catch(error => {
                    blackShutter.style.opacity = '0';
                    showPanelOverVideo();
                });
            }
        }

        function showPanelOverVideo() {
            if(!mainPanel.classList.contains('show')) {
                sessionStorage.setItem('vaiper_app_started', 'true');

                loadingScreen.classList.add('fade-out');
                mainPanel.classList.add('show');
                
                resizeCanvas();
                initLightningStorm(); 

                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500);
            }
        }

        function toggleAccordion(id) {
            const el = document.getElementById(id);
            const content = el.querySelector('.menu-content');
            const isActive = el.classList.contains('active');
            
            document.querySelectorAll('.menu-section').forEach(section => {
                section.classList.remove('active');
                section.querySelector('.menu-content').style.maxHeight = null;
                
                if (section.id === 'sec-aimbots') {
                    section.querySelectorAll('.cyber-switch input').forEach(input => {
                        input.checked = false;
                    });
                }
            });

            if (!isActive) {
                el.classList.add('active');
                content.style.maxHeight = content.scrollHeight + "px";
            }
        }

        function updateRangeValue(slider, valId) {
            document.getElementById(valId).innerText = slider.value + '%';
        }
    </script>
</body>
</html>
